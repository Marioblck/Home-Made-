<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111,#2b2b2b);
}

.login-box{
    width:350px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    margin-bottom:5px;
    color:#111;
}

.sub{
    text-align:center;
    color:gray;
    margin-bottom:30px;
    font-size:14px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
    outline:none;
    transition:0.2s;
}

.input-group input:focus{
    border-color:black;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">🍓</div>

    <h1>HOME MADE</h1>

    <p class="sub">
        Panel de administración
    </p>

    <div class="input-group">
        <label>Correo</label>
        <input type="email" id="correo" placeholder="Ingresa tu correo">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña">
    </div>

    <button onclick="login()">
        Entrar al panel
    </button>

    <div class="error" id="error"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyClXHe3J3Mixzh8GB1AF9qhWy1sJitDxjE",
    authDomain: "home-made-3738d.firebaseapp.com",
    projectId: "home-made-3738d",
    storageBucket: "home-made-3738d.appspot.com",
    messagingSenderId: "971246149984",
    appId: "1:971246149984:web:06457c532e9acec6847e05"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* LOGIN */
window.login = function(){

    const correo = document.getElementById("correo").value;

    const pass = document.getElementById("password").value;

    const error = document.getElementById("error");

    error.innerText = "";

    signInWithEmailAndPassword(auth, correo, pass)

    .then(()=>{

        window.location.href = "panel.html";

    })

    .catch(()=>{

        error.innerText = "Correo o contraseña incorrectos";

    });

}

</script>

</body>
</html>
