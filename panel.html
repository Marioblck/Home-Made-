<!DOCTYPE html>
<html>
<head>
    <title>Panel Admin</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:20px;
            font-family:Arial;
            background:#f3f4f6;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#111;
            font-size:35px;
        }

        #pedidos{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:22px;
            padding:22px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
            transition:0.2s;
        }

        .card:hover{
            transform:translateY(-3px);
        }

        .topo{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
        }

        .nombre{
            font-size:28px;
            font-weight:bold;
            color:#111;
            text-transform:capitalize;
        }

        .tipo{
            padding:8px 15px;
            border-radius:30px;
            color:white;
            font-size:13px;
            font-weight:bold;
        }

        .efectivo{
            background:black;
        }

        .transferencia{
            background:#2563eb;
        }

        .hora{
            margin-top:10px;
            color:gray;
            font-size:14px;
        }

        .total{
            margin-top:15px;
            font-size:28px;
            font-weight:bold;
            color:#16a34a;
        }

        .productos{
            margin-top:18px;
        }

        .producto{
            background:#f9fafb;
            border-radius:15px;
            padding:15px;
            margin-top:12px;
            border:1px solid #e5e7eb;
        }

        .producto-titulo{
            font-size:19px;
            font-weight:bold;
            margin-bottom:10px;
            color:#111827;
        }

        .detalle{
            margin-top:5px;
            color:#374151;
            font-size:15px;
        }

        .logout{
            position:fixed;
            top:15px;
            right:15px;
            border:none;
            background:red;
            color:white;
            padding:12px 16px;
            border-radius:12px;
            cursor:pointer;
            font-weight:bold;
            z-index:100;
        }
        .eliminar{
    margin-top:15px;
    width:100%;
    border:none;
    background:#dc2626;
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

        .control-panel{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.control-panel button{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.abrir{
    background:#16a34a;
}

.cerrar{
    background:#dc2626;
}

        @media(max-width:600px){

            body{
                padding:12px;
            }

            h1{
                font-size:28px;
            }

            .topo{
                flex-direction:column;
                align-items:flex-start;
            }

            .nombre{
                font-size:22px;
            }

            .total{
                font-size:24px;
            }
            .logout{
    position:static;
    width:100%;
    margin-bottom:15px;
}

.control-panel{
    flex-direction:column;
}

.control-panel button{
    width:100%;
}

        }

    </style>
</head>

<body>

<button class="logout" onclick="logout()">
    Cerrar sesión
</button>

<div class="control-panel">

    <button class="abrir" onclick="abrirPedidos()">
        ✅ Abrir pedidos
    </button>

    <button class="cerrar" onclick="cerrarPedidos()">
        ❌ Cerrar pedidos
    </button>

</div>

<h1>📦 Pedidos</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";


import {
    getFirestore,
    collection,
    getDocs,
    doc,
    setDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {
    apiKey: "AIzaSyClXHe3J3Mixzh8GB1AF9qhWy1sJitDxjE",
    authDomain: "home-made-3738d.firebaseapp.com",
    projectId: "home-made-3738d",
    storageBucket: "home-made-3738d.appspot.com",
    messagingSenderId: "971246149984",
    appId: "1:971246149984:web:06457c532e9acec6847e05"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* PROTEGER PANEL */

onAuthStateChanged(auth, (user)=>{

    if(!user){

        window.location.href = "admin.html";
        return;

    }

    cargarPedidos();

});

/* LOGOUT */

window.logout = function(){

    signOut(auth).then(()=>{

        window.location.href = "admin.html";

    });

}
window.abrirPedidos = async function(){

    await setDoc(doc(db, "configuracion", "estado"), {

        abierto:true

    });

    alert("Pedidos abiertos");

}

window.cerrarPedidos = async function(){

   
    await setDoc(doc(db, "configuracion", "estado"), {

        abierto:false

    });

    alert("Pedidos cerrados");

}

window.eliminarPedido = async function(id){

    try{

        let confirmar = confirm("¿Eliminar pedido?");

        if(!confirmar) return;

        await deleteDoc(doc(db, "pedidos", id));

        alert("✅ Pedido eliminado");

        cargarPedidos();

    }catch(error){

        console.log(error);

        alert("❌ Error: " + error.message);

    }

}


/* MOSTRAR PEDIDOS */

function mostrarProductos(carrito){

    let html = "";

    for(const categoria in carrito){

        const grupo = carrito[categoria];

        html += `

        <div class="producto">

            <div class="producto-titulo">
                ${categoria}
            </div>

        `;

        grupo.items.forEach((item)=>{

            for(const key in item){

                let nombre = key;

                /* FRESAS */
                if(key == "tamañoF") nombre = "Tamaño";
                if(key == "toppingUno") nombre = "T1";
                if(key == "toppingDos") nombre = "T2";
                if(key == "frutaExtra") nombre = "Fruta Extra";

                /* DURAZNOS */
                if(key == "tamañoD") nombre = "Tamaño";
                if(key == "toppingUnoD") nombre = "T1";
                if(key == "toppingDosD") nombre = "T2";
                if(key == "frutaExtraD") nombre = "Fruta Extra";

                /* CAKES */
                if(key == "tamañoC") nombre = "Tamaño";
                if(key == "toppingUnoC") nombre = "T1";
                if(key == "toppingDosC") nombre = "T2";
                if(key == "frutaExtraC") nombre = "Fruta Extra";
                if(key == "jarabeH") nombre = "Jarabe";

                /* BANDERILLAS */
                if(key == "relleno") nombre = "Relleno";
                if(key == "cubierta") nombre = "Cubierta";
                if(key == "aderezo") nombre = "Aderezo";
                if(key == "aderezo2") nombre = "Aderezo 2";

                /* BANDERILLAS DULCES */
                if(key == "rellenoD") nombre = "Relleno";
                if(key == "jarabe") nombre = "Jarabe";

                /* BUBBLE */
                if(key == "tamañoBE") nombre = "Tamaño";
                if(key == "saborBE") nombre = "Sabor";

                /* SODAS */
                if(key == "tamañoS") nombre = "Tamaño";
                if(key == "saborS") nombre = "Sabor";

                /* FRAPPE */
                if(key == "tamañoFR") nombre = "Tamaño";
                if(key == "saborFR") nombre = "Sabor";

                /* COSTILLAS */
                if(key == "aderezoCostilla") nombre = "Aderezo";

                /* GENERAL */
                if(key == "precio") nombre = "Precio";

                html += `

                <div class="detalle">
                    <b>${nombre}:</b> ${item[key]}
                </div>

                `;

            }

        });

        html += `

            <div class="detalle">
                <b>Cantidad:</b> ${grupo.cantidad}
            </div>

        </div>

        `;

    }

    return html;

}

async function cargarPedidos(){

    const contenedor = document.getElementById("pedidos");

    contenedor.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "pedidos"));

    querySnapshot.forEach((pedido)=>{

        const data = pedido.data();

        contenedor.innerHTML += `

        <div class="card">

            <div class="topo">

                <div class="nombre">
                    ${data.nombre}
                </div>

                <div class="tipo ${data.tipoPago}">
                    ${data.tipoPago}
                </div>

            </div>

            <div class="hora">
                🕒 ${data.hora || "Sin hora"}
            </div>

            <div class="total">
                $${data.total}
            </div>

            <div class="productos">

                ${mostrarProductos(data.carrito)}

            </div>
            <button class="eliminar"
onclick="eliminarPedido('${pedido.id}')">

    🗑 Eliminar pedido

</button>


        </div>

        `;

    });

}

</script>

</body>
</html>
